<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
    <link rel="stylesheet" href="index.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MLScale Dashboard</title>
</head>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <body>
    <div id="serviceView" class="view">
        <div id="listServices" class="list-services-container">
            <button class="settings-button" id="settingsButton">Scaling settings</button>
            <h1>Known Services:</h1>
            <button class="service-button" id="bookServiceButton">
                bookService
            </button>
            <button class="service-button" id="orderServiceButton">
                orderService
            </button>
        </div>
            <div class="service-data-container" id="serviceDataContainer">
                <h1 id="serviceTitle">Choose a service</h1>
                <div class="chart-container">
                <canvas id="serviceChart"></canvas>
                </div>
                <div class="container-list-container" id="containerListContainer">
                </div>
            </div>
            <div class="service-data-container-hidden" id="settingsContainer">

            </div>
    </div>
    <div id="loadingOverlay" class="loader-hidden">
        <div class="spinner"></div>
    </div>
    <script type="module" src="index.js"></script>
    </body>
</html>
